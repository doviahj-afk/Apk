name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix project structure
        run: |
          set -e
          mkdir -p app/src/main/java/com/sysdownloader/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          [ -f AndroidManifest.xml ] && mv -f AndroidManifest.xml app/src/main/AndroidManifest.xml || true
          [ -f MainActivity.kt ] && rm -f MainActivity.kt || true
          [ -f activity_main.xml ] && mv -f activity_main.xml app/src/main/res/layout/activity_main.xml || true
          [ -f colors.xml ] && mv -f colors.xml app/src/main/res/values/colors.xml || true
          [ -f strings.xml ] && mv -f strings.xml app/src/main/res/values/strings.xml || true
          [ -f themes.xml ] && mv -f themes.xml app/src/main/res/values/themes.xml || true
          rm -f build.yml

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          rootProject.name = "SysDownloader"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.sysdownloader.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.sysdownloader.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              buildFeatures {
                  viewBinding true
              }

              packagingOptions {
                  jniLibs {
                      useLegacyPackaging true
                  }
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'io.github.junkfood02.youtubedl-android:library:0.18.1'
              implementation 'io.github.junkfood02.youtubedl-android:ffmpeg:0.18.1'
          }
          EOF

          # ---- AndroidManifest.xml -------------------------------------------------
          # Always (re)generate it so required permissions/flags are guaranteed to be
          # present, regardless of whether the repo already shipped one.
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="28" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"
                  tools:ignore="ScopedStorage" />

              <application
                  android:allowBackup="true"
                  android:extractNativeLibs="true"
                  android:requestLegacyExternalStorage="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.SysDownloader">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # ---- Fallback resource files (only created if the repo didn't provide them) ----
          if [ ! -f app/src/main/res/values/strings.xml ]; then
            cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">SysDownloader</string>
          </resources>
          EOF
          fi

          if [ ! -f app/src/main/res/values/colors.xml ]; then
            cat > app/src/main/res/values/colors.xml << 'EOF'
          <resources>
              <color name="term_yellow">#FFD866</color>
              <color name="term_red">#FF5555</color>
              <color name="term_green">#50FA7B</color>
              <color name="term_cyan">#8BE9FD</color>
          </resources>
          EOF
          fi

          if [ ! -f app/src/main/res/values/themes.xml ]; then
            cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources xmlns:tools="http://schemas.android.com/tools">
              <style name="Theme.SysDownloader" parent="Theme.AppCompat.DayNight.NoActionBar" />
          </resources>
          EOF
          fi

          # ---- MainActivity.kt -------------------------------------------------
          cat > app/src/main/java/com/sysdownloader/app/MainActivity.kt << 'EOF'
          package com.sysdownloader.app

          import android.content.Intent
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.Environment
          import android.provider.Settings
          import android.widget.ArrayAdapter
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          import com.sysdownloader.app.databinding.ActivityMainBinding
          import com.yausername.ffmpeg.FFmpeg
          import com.yausername.youtubedl_android.YoutubeDL
          import com.yausername.youtubedl_android.YoutubeDLRequest
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.launch
          import kotlinx.coroutines.withContext
          import java.io.File

          class MainActivity : AppCompatActivity() {

              private lateinit var binding: ActivityMainBinding
              private var ytdlpReady = false

              private val qualityOptions = listOf("Best", "1080p", "720p", "480p")
              private val storagePermissionCode = 1001

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  binding.qualitySpinner.adapter = ArrayAdapter(
                      this, android.R.layout.simple_spinner_dropdown_item, qualityOptions
                  )

                  ensureStoragePermission()

                  log("$ initializing yt-dlp runtime...")
                  initRuntime()

                  binding.downloadButton.setOnClickListener { startDownload() }
              }

              private fun ensureStoragePermission() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      if (!Environment.isExternalStorageManager()) {
                          Toast.makeText(
                              this,
                              "Grant 'All files access' to save to Downloads",
                              Toast.LENGTH_LONG
                          ).show()
                          val intent = Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION)
                          intent.data = Uri.parse("package:$packageName")
                          startActivity(intent)
                      }
                  } else {
                      val granted = ContextCompat.checkSelfPermission(
                          this, android.Manifest.permission.WRITE_EXTERNAL_STORAGE
                      )
                      if (granted != android.content.pm.PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(
                              this,
                              arrayOf(android.Manifest.permission.WRITE_EXTERNAL_STORAGE),
                              storagePermissionCode
                          )
                      }
                  }
              }

              private fun initRuntime() {
                  CoroutineScope(Dispatchers.IO).launch {
                      try {
                          YoutubeDL.getInstance().init(applicationContext)
                          FFmpeg.getInstance().init(applicationContext)

                          withContext(Dispatchers.Main) { log("$ checking for yt-dlp updates...") }
                          try {
                              val status = YoutubeDL.getInstance().updateYoutubeDL(applicationContext)
                              withContext(Dispatchers.Main) { log("$ yt-dlp update status: $status") }
                          } catch (e: Exception) {
                              withContext(Dispatchers.Main) { log("! yt-dlp update check failed: ${e.message}") }
                          }

                          ytdlpReady = true
                          withContext(Dispatchers.Main) {
                              log("$ yt-dlp runtime ready.")
                              setStatus("idle", R.color.term_yellow)
                          }
                      } catch (e: Exception) {
                          withContext(Dispatchers.Main) {
                              log("! init failed: ${e.message}")
                              setStatus("init error", R.color.term_red)
                          }
                      }
                  }
              }

              private fun getDownloadsDir(): File {
                  val dir = File(
                      Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS),
                      "SysDownloader"
                  )
                  if (!dir.exists()) dir.mkdirs()
                  return dir
              }

              private fun startDownload() {
                  val url = binding.urlInput.text.toString().trim()
                  if (url.isEmpty()) {
                      Toast.makeText(this, "Enter a URL first", Toast.LENGTH_SHORT).show()
                      return
                  }
                  if (!ytdlpReady) {
                      Toast.makeText(this, "yt-dlp still initializing, wait a moment", Toast.LENGTH_SHORT).show()
                      return
                  }
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R && !Environment.isExternalStorageManager()) {
                      Toast.makeText(this, "Storage permission not granted yet", Toast.LENGTH_SHORT).show()
                      ensureStoragePermission()
                      return
                  }

                  val audioOnly = binding.radioAudio.isChecked
                  val playlist = binding.playlistCheck.isChecked
                  val quality = qualityOptions[binding.qualitySpinner.selectedItemPosition]

                  binding.downloadButton.isEnabled = false
                  binding.progressBar.progress = 0
                  setStatus("starting...", R.color.term_cyan)
                  log("$ downloading: $url")

                  CoroutineScope(Dispatchers.IO).launch {
                      try {
                          val outDir = getDownloadsDir()

                          val request = YoutubeDLRequest(url)
                          request.addOption("-o", outDir.absolutePath + "/%(title)s.%(ext)s")

                          if (!playlist) request.addOption("--no-playlist")
                          else request.addOption("--yes-playlist")

                          if (audioOnly) {
                              request.addOption("-x")
                              request.addOption("--audio-format", "mp3")
                              request.addOption("--audio-quality", "0")
                          } else {
                              val fmt = when (quality) {
                                  "1080p" -> "bv*[height<=1080]+ba/b[height<=1080]"
                                  "720p"  -> "bv*[height<=720]+ba/b[height<=720]"
                                  "480p"  -> "bv*[height<=480]+ba/b[height<=480]"
                                  else    -> "bv*+ba/b"
                              }
                              request.addOption("-f", fmt)
                              request.addOption("--merge-output-format", "mp4")
                          }

                          YoutubeDL.getInstance().execute(request) { progress, _, line ->
                              CoroutineScope(Dispatchers.Main).launch {
                                  binding.progressBar.progress = progress.toInt().coerceIn(0, 100)
                                  setStatus("${progress.toInt()}%", R.color.term_cyan)
                                  if (line.isNotBlank()) log(line)
                              }
                          }

                          withContext(Dispatchers.Main) {
                              setStatus("done", R.color.term_green)
                              log("$ saved to: ${outDir.absolutePath}")
                              binding.downloadButton.isEnabled = true
                          }
                      } catch (e: Exception) {
                          withContext(Dispatchers.Main) {
                              setStatus("failed", R.color.term_red)
                              log("! error: ${e.message}")
                              binding.downloadButton.isEnabled = true
                          }
                      }
                  }
              }

              private fun log(line: String) {
                  binding.logConsole.append("$line\n")
              }

              private fun setStatus(text: String, colorRes: Int) {
                  binding.statusLabel.text = text
                  binding.statusLabel.setTextColor(getColor(colorRes))
              }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sysdownloader-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
